<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natura Zen — Plant Images</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gd:#1A5C3A;--gm:#2A7D4F;--gl:#48C9B0;--cream:#F7F4EE;--text:#1a1a1a;--soft:#777;--bd:#e4e4e4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;}
header{background:var(--gd);padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.25);}
header h1{font-family:'Playfair Display',serif;color:#fff;font-size:1rem;line-height:1.2;}
header small{color:var(--gl);font-size:0.7rem;margin-left:auto;text-align:right;line-height:1.4;}
.wrap{max-width:860px;margin:0 auto;padding:16px 13px;}
.card-ui{background:#fff;border-radius:14px;padding:15px;box-shadow:0 3px 16px rgba(0,0,0,.07);margin-bottom:14px;}
.row{display:flex;gap:8px;margin-bottom:12px;}
input[type=text]{flex:1;padding:10px 13px;border:2px solid var(--bd);border-radius:9px;font-size:0.92rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;background:var(--cream);}
input[type=text]:focus{border-color:var(--gm);background:#fff;}
.btn{background:var(--gd);color:#fff;border:none;padding:10px 15px;border-radius:9px;font-size:0.87rem;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:background .2s;white-space:nowrap;}
.btn:hover{background:var(--gm);}
.btn:disabled{background:#bbb;cursor:not-allowed;}
.sources-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.src-pill{padding:5px 12px;border-radius:20px;font-size:0.72rem;font-weight:600;border:2px solid;transition:all .2s;cursor:pointer;user-select:none;}
.src-pill:hover{transform:scale(1.05);}
.src-pill.inat.on{background:#e8f8ef;color:#27AE60;border-color:#27AE60;}
.src-pill.inat.off{background:#f8f8f8;color:#aaa;border-color:#ddd;text-decoration:line-through;}
.src-pill.wiki.on{background:#e8f0f8;color:#2471A3;border-color:#2471A3;}
.src-pill.wiki.off{background:#f8f8f8;color:#aaa;border-color:#ddd;text-decoration:line-through;}
.src-pill.pixabay.on{background:#fff8e0;color:#c07800;border-color:#E8A000;}
.src-pill.pixabay.off{background:#f8f8f8;color:#aaa;border-color:#ddd;text-decoration:line-through;}
.src-pill.pexels.on{background:#fde8e8;color:#c0392b;border-color:#c0392b;}
.src-pill.pexels.off{background:#f8f8f8;color:#aaa;border-color:#ddd;text-decoration:line-through;}

.api-section{margin-bottom:12px;}
.api-section h3{font-size:0.75rem;color:var(--soft);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.api-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.api-row label{font-size:0.75rem;font-weight:600;min-width:68px;color:var(--text);}
.api-row input{flex:1;min-width:120px;padding:8px 10px;border:2px solid var(--bd);border-radius:8px;font-size:0.78rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.api-row input:focus{border-color:var(--gm);}
.btn-test{padding:8px 12px;border-radius:8px;font-size:0.75rem;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;font-weight:600;transition:all .2s;white-space:nowrap;}
.btn-test.pixabay{background:#E8A000;color:#fff;}
.btn-test.pexels{background:#c0392b;color:#fff;}
.btn-test:hover{opacity:.85;}
.btn-test:disabled{background:#ccc;cursor:not-allowed;}
.api-st{font-size:0.72rem;padding:3px 8px;border-radius:6px;font-weight:500;white-space:nowrap;}
.api-st.ok{background:#e8f8ef;color:#27AE60;}
.api-st.err{background:#fde8e8;color:#c0392b;}
.api-st.testing{background:#fff8e0;color:#c07800;}
.api-link{font-size:0.7rem;color:var(--gm);text-decoration:none;}

.chips-label{font-size:0.74rem;color:var(--soft);margin-bottom:7px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{background:#edf7f2;color:var(--gd);border:1px solid #b8e4c8;border-radius:20px;padding:4px 11px;font-size:0.73rem;cursor:pointer;transition:all .15s;font-style:italic;}
.chip:hover,.chip.active{background:var(--gd);color:#fff;border-color:var(--gd);}

.status{text-align:center;padding:12px;color:var(--soft);font-size:0.86rem;min-height:42px;}
.status.loading{color:var(--gm);}
.status.ok{color:var(--gm);font-weight:500;}
.status.err{color:#c0392b;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:11px;}
.card{background:#fff;border-radius:11px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.12);}
.img-wrap{position:relative;height:170px;background:linear-gradient(135deg,#edf7f2,#cee8d8);}
.img-wrap img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;opacity:0;transition:opacity .35s;}
.img-wrap img.loaded{opacity:1;}
.placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--gm);gap:5px;font-size:0.76rem;pointer-events:none;}
.card-body{padding:10px 11px;}
.badge{display:inline-block;font-size:0.63rem;padding:2px 7px;border-radius:20px;color:#fff;font-weight:600;margin-bottom:5px;}
.badge.inat{background:#27AE60;}.badge.wiki{background:#2471A3;}.badge.pixabay{background:#c07800;}.badge.pexels{background:#c0392b;}
.card-name{font-family:'Playfair Display',serif;font-style:italic;font-size:0.83rem;color:var(--text);margin-bottom:3px;line-height:1.3;}
.card-lic{font-size:0.66rem;color:#27AE60;font-weight:500;margin-bottom:3px;}
.card-author{font-size:0.64rem;color:#aaa;margin-bottom:8px;}
.actions{display:flex;gap:5px;}
.btn-sm{flex:1;padding:6px 4px;border-radius:7px;font-size:0.73rem;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;font-weight:500;transition:all .15s;}
.btn-copy{background:#f0f0f0;color:var(--text);}.btn-copy:hover{background:#e0e0e0;}.btn-copy.done{background:var(--gl);color:#fff;}
.btn-src{background:var(--gd);color:#fff;}.btn-src:hover{background:var(--gm);}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;padding:12px;flex-direction:column;gap:10px;}
.lb.on{display:flex;}
.lb img{max-width:94vw;max-height:78vh;border-radius:8px;object-fit:contain;}
.lb-info{color:#ccc;font-size:0.76rem;text-align:center;max-width:380px;line-height:1.5;}
.lb-x{position:absolute;top:12px;right:16px;color:#fff;font-size:1.6rem;cursor:pointer;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #c8e8d4;border-top-color:var(--gm);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:480px){.grid{grid-template-columns:1fr 1fr;}.img-wrap{height:140px;}.api-row{flex-wrap:wrap;}}
</style>
</head>
<body>
<header>
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
    <circle cx="13" cy="13" r="12" fill="#2A7D4F"/>
    <circle cx="13" cy="10" r="5.5" fill="#f0f0e0" opacity=".9"/>
    <path d="M10 12 Q13 7 16 12" fill="#48C9B0"/>
    <path d="M7 16 Q13 11 19 16 Q16 19 10 19Z" fill="#27AE60"/>
    <line x1="13" y1="13" x2="13" y2="19" stroke="#1A5C3A" stroke-width="1.2"/>
  </svg>
  <h1>Natura Zen<br>Plant Images</h1>
  <small>4 free sources<br>commercial use ✓</small>
</header>

<div class="wrap">
  <div class="card-ui">
    <div class="row">
      <input id="q" type="text" placeholder="Latin name: Acer palmatum…">
      <button class="btn" id="searchBtn" onclick="doSearch()">🔍 Search</button>
    </div>

    <div class="sources-bar">
      <span class="src-pill inat on" id="pillInat" onclick="toggleSrc('inat')">✅ iNaturalist</span>
      <span class="src-pill wiki on" id="pillWiki" onclick="toggleSrc('wiki')">✅ Wikimedia</span>
      <span class="src-pill pixabay off" id="pillPixabay" onclick="toggleSrc('pixabay')">⬜ Pixabay</span>
      <span class="src-pill pexels off" id="pillPexels" onclick="toggleSrc('pexels')">⬜ Pexels</span>
    </div>

    <div class="api-section">
      <h3>🔑 API Keys — unlock more sources</h3>
      <div class="api-row">
        <label>🟡 Pixabay</label>
        <input type="text" id="pixabayKey" placeholder="Paste key…" oninput="onKey('pixabay')">
        <button class="btn-test pixabay" id="testPixabay" onclick="testPixabay()">Test ▶</button>
        <span class="api-st" id="stPixabay"></span>
        <a class="api-link" href="https://pixabay.com/api/docs/" target="_blank">Get free →</a>
      </div>
      <div class="api-row">
        <label>🔴 Pexels</label>
        <input type="text" id="pexelsKey" placeholder="Paste key…" oninput="onKey('pexels')">
        <button class="btn-test pexels" id="testPexels" onclick="testPexels()">Test ▶</button>
        <span class="api-st" id="stPexels"></span>
        <a class="api-link" href="https://www.pexels.com/api/" target="_blank" style="color:#c0392b">Get free →</a>
      </div>
    </div>

    <div class="chips-label">Your plants — tap to search:</div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="status" id="status">Tap a plant chip above to start searching.</div>
  <div class="grid" id="grid"></div>
</div>

<div class="lb" id="lb" onclick="closeLb(event)">
  <button class="lb-x" onclick="closeLb()">✕</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-info" id="lbInfo"></div>
</div>

<script>
const PLANTS=["Acer palmatum","Calamagrostis acutiflora","Hydrangea macrophylla","Hydrangea paniculata","Ilex crenata","Juniperus squamata","Loropetalum chinense","Nassella tenuissima","Ophiopogon japonicus","Osmanthus heterophyllus","Rhododendron","Rosa"];

// Restore keys
['pixabay','pexels'].forEach(s=>{
  const v=localStorage.getItem('nz_'+s)||'';
  if(v){document.getElementById(s+'Key').value=v;pill(s,true);}
});

// Source states
const srcEnabled={inat:true,wiki:true,pixabay:false,pexels:false};

function toggleSrc(s){
  // For pixabay/pexels only toggle if key exists
  if((s==="pixabay"||s==="pexels")00260026!document.getElementById(s+"Key").value.trim()){
    document.getElementById("st"+s[0].toUpperCase()+s.slice(1)).textContent="⚠ Enter key first";
    document.getElementById("st"+s[0].toUpperCase()+s.slice(1)).className="api-st err";
    return;
  }
  srcEnabled[s]=!srcEnabled[s];
  const el=document.getElementById("pill"+s[0].toUpperCase()+s.slice(1));
  const names={inat:"iNaturalist",wiki:"Wikimedia",pixabay:"Pixabay",pexels:"Pexels"};
  el.textContent=(srcEnabled[s]?"✅ ":"❌ ")+names[s];
  el.className="src-pill "+s+" "+(srcEnabled[s]?"on":"off");
}

function onKey(s){
  const v=document.getElementById(s+'Key').value.trim();
  localStorage.setItem('nz_'+s,v);
  setSt(s,'','');
  pill(s,false);
}

function pill(s,on){
  const el=document.getElementById('pill'+s[0].toUpperCase()+s.slice(1));
  el.textContent = on ? `✅ ${s[0].toUpperCase()+s.slice(1)}` : `⬜ ${s[0].toUpperCase()+s.slice(1)}`;
  el.className = `src-pill ${s} ${on?'on':'off'}`;
}

function setSt(s,msg,cls){
  const el=document.getElementById('st'+s[0].toUpperCase()+s.slice(1));
  el.textContent=msg; el.className='api-st'+(cls?' '+cls:'');
}

// ── JSONP helper (bypasses CORS for local files) ──────────────────────────
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='_cb'+Date.now()+Math.random().toString(36).slice(2);
    window[cb]=function(data){ resolve(data); delete window[cb]; document.head.removeChild(script); };
    const script=document.createElement('script');
    script.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    script.onerror=()=>{ reject(new Error('JSONP failed')); delete window[cb]; document.head.removeChild(script); };
    document.head.appendChild(script);
    setTimeout(()=>{ if(window[cb]){ reject(new Error('Timeout')); delete window[cb]; }},8000);
  });
}

// ── TEST PIXABAY ──────────────────────────────────────────────────────────
async function testPixabay(){
  const key=document.getElementById('pixabayKey').value.trim();
  if(!key){setSt('pixabay','⚠ Enter key first','err');return;}
  document.getElementById('testPixabay').disabled=true;
  setSt('pixabay','Testing…','testing');
  try{
    const d=await jsonp(`https://pixabay.com/api/?key=${key}&q=rose&per_page=3&image_type=photo`);
    if(d.totalHits>0){
      setSt('pixabay',`✅ Works! ${d.totalHits.toLocaleString()} images`,'ok');
      pill('pixabay',true); srcEnabled.pixabay=true;
      localStorage.setItem('nz_pixabay',key);
    } else {
      setSt('pixabay','❌ Invalid key','err');
      pill('pixabay',false); srcEnabled.pixabay=false;
    }
  }catch(e){
    setSt('pixabay','❌ '+e.message,'err');
    pill('pixabay',false); srcEnabled.pixabay=false;
  }
  document.getElementById('testPixabay').disabled=false;
}

// ── TEST PEXELS ───────────────────────────────────────────────────────────
async function testPexels(){
  const key=document.getElementById('pexelsKey').value.trim();
  if(!key){setSt('pexels','⚠ Enter key first','err');return;}
  document.getElementById('testPexels').disabled=true;
  setSt('pexels','Testing…','testing');
  try{
    const r=await fetch('https://api.pexels.com/v1/search?query=rose&per_page=3',{headers:{Authorization:key}});
    if(r.status===401){setSt('pexels','❌ Invalid key','err');pill('pexels',false); srcEnabled.pexels=false;}
    else{
      const d=await r.json();
      if(d.photos?.length){
        setSt('pexels',`✅ Works! ${d.total_results?.toLocaleString()} images`,'ok');
        pill('pexels',true); srcEnabled.pexels=true;
        localStorage.setItem('nz_pexels',key);
      } else {setSt('pexels','❌ No results','err');pill('pexels',false); srcEnabled.pexels=false;}
    }
  }catch(e){setSt('pexels','❌ '+e.message,'err');pill('pexels',false); srcEnabled.pexels=false;}
  document.getElementById('testPexels').disabled=false;
}

// ── Plant chips ───────────────────────────────────────────────────────────
let cur=null;
const chipsEl=document.getElementById('chips');
PLANTS.forEach(name=>{
  const c=document.createElement('span');
  c.className='chip';c.textContent=name;
  c.onclick=()=>{
    document.getElementById('q').value=name;
    if(cur)cur.classList.remove('active');
    cur=c;c.classList.add('active');
    doSearch();
  };
  chipsEl.appendChild(c);
});

// ── MAIN SEARCH ───────────────────────────────────────────────────────────
async function doSearch(){
  const query=document.getElementById('q').value.trim();
  if(!query)return;
  const status=document.getElementById('status');
  const grid=document.getElementById('grid');
  const btn=document.getElementById('searchBtn');
  status.innerHTML='<span class="spinner"></span> Searching free databases…';
  status.className='status loading';
  grid.innerHTML='';
  btn.disabled=true;

  const pixKey=document.getElementById('pixabayKey').value.trim();
  const pexKey=document.getElementById('pexelsKey').value.trim();
  const searches=[];
  if(srcEnabled.inat) searches.push(searchINat(query));
  if(srcEnabled.wiki) searches.push(searchWikimedia(query));
  if(pixKey)searches.push(searchPixabay(query,pixKey));
  if(pexKey)searches.push(searchPexels(query,pexKey));

  const settled=await Promise.allSettled(searches);
  const results=settled.flatMap(r=>r.status==='fulfilled'?r.value:[]);

  if(!results.length){
    status.textContent=`No images found for "${query}". Try different spelling.`;
    status.className='status err';
  } else {
    const srcs=[...new Set(results.map(r=>r.src))];
    status.textContent=`✅ ${results.length} images from: ${srcs.join(', ')}`;
    status.className='status ok';
    results.forEach(r=>grid.appendChild(makeCard(r)));
  }
  btn.disabled=false;
}

// ── iNaturalist ───────────────────────────────────────────────────────────
async function searchINat(query){
  const tr=await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(query)}&per_page=1`);
  const td=await tr.json();
  const taxon=td.results?.[0];
  if(!taxon)return[];
  const or=await fetch(`https://api.inaturalist.org/v1/observations?taxon_id=${taxon.id}&quality_grade=research&photo_license=cc0,cc-by,cc-by-sa&photos=true&per_page=12&order_by=votes`);
  const od=await or.json();
  const out=[];
  for(const obs of od.results||[]){
    for(const photo of(obs.photos||[]).slice(0,2)){
      if(!photo.url)continue;
      const img=photo.url.replace('/square.','/medium.').replace('square','medium');
      const lic=(photo.license_code||'cc0').toUpperCase();
      const auth=obs.user?.name||obs.user?.login||'iNaturalist';
      out.push({src:'iNaturalist',badge:'inat',name:taxon.name,imgUrl:img,copyUrl:img,
        license:`${lic} — Free ✓`,author:auth,
        pageUrl:`https://www.inaturalist.org/observations/${obs.id}`,
        lbInfo:`${taxon.name} · © ${auth} · ${lic}`});
      if(out.length>=8)return out;
    }
  }
  return out;
}

// ── Wikimedia ─────────────────────────────────────────────────────────────
async function searchWikimedia(query){
  const r=await fetch(`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrnamespace=6&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=800&format=json&origin=*&gsrlimit=15`);
  const d=await r.json();
  const out=[];
  for(const item of Object.values(d.query?.pages||{})){
    const info=item.imageinfo?.[0];
    if(!info?.url)continue;
    const img=info.thumburl||info.url;
    if(!img.match(/\.(jpg|jpeg|png|webp)/i))continue;
    const lic=info.extmetadata?.LicenseShortName?.value||'';
    if(lic&&(lic.includes('NC')||lic.includes('ND')||lic.includes('reserved')))continue;
    const auth=(info.extmetadata?.Artist?.value||'').replace(/<[^>]+>/g,'').slice(0,40)||'Unknown';
    out.push({src:'Wikimedia',badge:'wiki',
      name:(item.title||'').replace('File:','').replace(/_/g,' ').split('.')[0].slice(0,40),
      imgUrl:img,copyUrl:info.url,license:`${lic||'CC'} — Free ✓`,author:auth,
      pageUrl:`https://commons.wikimedia.org/wiki/${encodeURIComponent(item.title)}`,
      lbInfo:`© ${auth} · ${lic} · Wikimedia`});
    if(out.length>=6)return out;
  }
  return out;
}

// ── Pixabay (JSONP — works on local files!) ───────────────────────────────
async function searchPixabay(query,key){
  const d=await jsonp(`https://pixabay.com/api/?key=${key}&q=${encodeURIComponent(query)}&image_type=photo&per_page=10&safesearch=true`);
  if(!d.hits)throw new Error('Invalid response');
  return d.hits.slice(0,8).map(h=>({
    src:'Pixabay',badge:'pixabay',name:query,
    imgUrl:h.webformatURL,copyUrl:h.largeImageURL||h.webformatURL,
    license:'Pixabay License — Free, no attribution ✓',
    author:h.user||'Pixabay',pageUrl:h.pageURL||'https://pixabay.com',
    lbInfo:`© ${h.user} · Pixabay License · Free commercial use`
  }));
}

// ── Pexels ────────────────────────────────────────────────────────────────
async function searchPexels(query,key){
  const r=await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=8`,{headers:{Authorization:key}});
  if(r.status===401)throw new Error('Invalid key');
  const d=await r.json();
  return(d.photos||[]).map(p=>({
    src:'Pexels',badge:'pexels',name:query,
    imgUrl:p.src?.medium||p.src?.original,copyUrl:p.src?.original||p.src?.large,
    license:'Pexels License — Free, no attribution ✓',
    author:p.photographer||'Pexels',pageUrl:p.url||'https://pexels.com',
    lbInfo:`© ${p.photographer} · Pexels · Free commercial use`
  }));
}

// ── Card ──────────────────────────────────────────────────────────────────
function makeCard(r){
  const d=document.createElement('div');
  d.className='card';
  const si=(r.imgUrl||'').replace(/'/g,'%27');
  const sc=(r.copyUrl||r.imgUrl||'').replace(/'/g,'%27');
  const sp=(r.pageUrl||'').replace(/'/g,'%27');
  const sl=(r.lbInfo||'').replace(/'/g,'%27');
  d.innerHTML=`
    <div class="img-wrap">
      <div class="placeholder"><span style="font-size:1.8rem">🌿</span><span>Loading…</span></div>
      <img src="${si}" alt="${r.name}"
        onload="this.classList.add('loaded');this.previousElementSibling.style.display='none'"
        onerror="this.style.display='none';this.previousElementSibling.querySelector('span:last-child').textContent='Unavailable'"
        onclick="openLb('${si}','${sl}')">
    </div>
    <div class="card-body">
      <span class="badge ${r.badge}">${r.src}</span>
      <div class="card-name">${r.name}</div>
      <div class="card-lic">${r.license}</div>
      <div class="card-author">© ${r.author}</div>
      <div class="actions">
        <button class="btn-sm btn-copy" onclick="copyIt(this,'${sc}')">📋 Copy</button>
        <button class="btn-sm btn-src" onclick="window.open('${sp}','_blank')">↗ View</button>
      </div>
    </div>`;
  return d;
}

function copyIt(btn,url){
  const text=decodeURIComponent(url);
  (navigator.clipboard?.writeText(text)||Promise.reject()).catch(()=>{
    const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
  });
  btn.textContent='✅ Copied!';btn.classList.add('done');
  setTimeout(()=>{btn.textContent='📋 Copy';btn.classList.remove('done');},2000);
}

function openLb(url,info){
  document.getElementById('lbImg').src=decodeURIComponent(url);
  document.getElementById('lbInfo').textContent=decodeURIComponent(info);
  document.getElementById('lb').classList.add('on');
}
function closeLb(e){
  if(!e||e.target===document.getElementById('lb')||e.currentTarget?.classList?.contains('lb-x'))
    document.getElementById('lb').classList.remove('on');
}
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
